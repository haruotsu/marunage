name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pin both the action major and the tool version so a release
          # outside our control cannot break CI silently.
          version: v2.12.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test
        run: make test
      - name: build
        run: make build
