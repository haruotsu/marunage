name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Pin the tool version so an upstream release cannot break CI silently.
          # action@v7 is required to drive golangci-lint v2.x — v6 only supports v1.x.
          version: v2.12.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test
        run: make test
      - name: build
        run: make build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci
      - name: lint
        working-directory: web
        run: npm run lint
      - name: type-check
        working-directory: web
        run: npm run type-check
      - name: build
        working-directory: web
        run: npm run build

  build-with-nextjs:
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: install web deps
        working-directory: web
        run: npm ci
      - name: build web
        working-directory: web
        run: npm run build
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build with nextjs
        run: go build -tags nextjs ./...
