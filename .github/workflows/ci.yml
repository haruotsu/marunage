name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Pin the tool version so an upstream release cannot break CI silently.
          # action@v7 is required to drive golangci-lint v2.x — v6 only supports v1.x.
          version: v2.12.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test
        run: make test
      - name: build
        run: make build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: build slackhog image
        run: docker compose build slackhog
